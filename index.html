<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIDIB - L'ANTHOLOGIE</title>
    <style>
        :root { --gold: #f39c12; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 160px; }
        
        .header { padding: 20px; text-align: center; background: var(--card); border-bottom: 2px solid var(--gold); }
        .search-box { padding: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        #search { width: 90%; padding: 12px; border-radius: 25px; border: 1px solid #333; background: var(--card); color: white; outline: none; display: block; margin: auto; font-size: 1rem; }

        .track-list { padding: 10px; max-width: 600px; margin: auto; }
        .song-card { display: flex; align-items: center; background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .song-card:active { scale: 0.98; background: #222; }
        .song-card img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #222; }
        .song-info b { display: block; font-size: 1.1rem; color: #fff; }
        .song-info span { color: #777; font-size: 0.85rem; }

        .player-fixed { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(10px); border-top: 2px solid var(--gold); padding: 15px 0; z-index: 100; }
        .progress-container { width: 100%; height: 5px; background: #222; position: absolute; top: 0; cursor: pointer; }
        #progress { height: 100%; background: var(--gold); width: 0%; transition: width 0.1s linear; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; }
        .btn { background: none; border: none; color: #fff; font-size: 2.5rem; cursor: pointer; }
        .play-main { font-size: 3.8rem; color: var(--gold); }
        .playing-title { text-align: center; font-size: 0.9rem; margin-bottom: 10px; color: var(--gold); font-weight: bold; padding: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dedicace { text-align: center; font-size: 0.75rem; color: #666; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">DIDI B : L'ANTHOLOGIE</h2>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Rechercher un titre..." onkeyup="filtrer()">
</div>

<div class="track-list" id="container">
    </div>

<div class="player-fixed">
    <div class="playing-title" id="now-playing">SÉLECTIONNEZ UN MORCEAU</div>
    <div class="progress-container" id="p-cont"><div id="progress"></div></div>
    <div class="controls">
        <button class="btn" onclick="prev()">⏮</button>
        <button class="btn play-main" id="pBtn" onclick="playPause()">▶</button>
        <button class="btn" onclick="next()">⏭</button>
    </div>
    <div class="dedicace">DÉDICACE : <span style="color:#aaa">LE ZRANOTHINIEL</span> & TEAM SHAMA</div>
</div>

<script src="brain.js"></script>
</body>
</html>
