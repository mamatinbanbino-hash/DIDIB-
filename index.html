<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIDIB - L'INTÉGRALE</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #f39c12; --black: #050505; --grey: #121212; }
        body { background: var(--black); color: white; font-family: 'Roboto', sans-serif; margin: 0; padding-bottom: 120px; }
        
        /* Header & Lecteur Fixe en Haut */
        .now-playing { position: sticky; top: 0; background: var(--grey); padding: 15px; border-bottom: 2px solid var(--gold); z-index: 100; text-align: center; }
        .mini-art { width: 60px; height: 60px; border-radius: 5px; float: left; }
        .song-info { margin-left: 75px; text-align: left; }
        
        /* Liste des Sons */
        .track-list { padding: 10px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .track-item:active { background: #333; }
        .track-img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; }
        .track-details h4 { margin: 0; font-size: 1rem; }
        .track-details p { margin: 0; font-size: 0.8rem; color: #888; }

        /* Barre de contrôle Fixe en Bas */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: var(--grey); padding: 10px 0; border-top: 1px solid #333; }
        .controls { display: flex; justify-content: space-around; align-items: center; }
        .btn { background: none; border: none; color: white; font-size: 1.8rem; }
        .progress-container { width: 100%; height: 4px; background: #333; position: absolute; top: 0; }
        #progress { height: 100%; background: var(--gold); width: 0%; }
        
        .dedicace { font-size: 0.6rem; color: #444; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="now-playing">
        <img src="logo.png" id="current-art" class="mini-art">
        <div class="song-info">
            <b id="current-title">Choisissez un son</b><br>
            <span id="current-lyric" style="color:var(--gold); font-size:0.9rem;">Dédicace : Le Zranothiniel</span>
        </div>
    </div>

    <div class="track-list" id="list">
        </div>

    <div class="player-bar">
        <div class="progress-container"><div id="progress"></div></div>
        <div class="controls">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn" id="playBtn" onclick="toggle()" style="font-size:2.5rem; color:var(--gold);">▶</button>
            <button class="btn" onclick="next()">⏭</button>
        </div>
        <div class="dedicace">DÉDICACE : LE ZRANOTHINIEL & TEAM SHAMA</div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
